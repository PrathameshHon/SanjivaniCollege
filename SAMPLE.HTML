<!DOCTYPE html>
<html>
<head>
  <title>G & H Chat Room</title>
 <link rel="stylesheet" href="chat.css">
</head>

<body>

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="360_F_864564895_VdC0Ee8ufXbwwZfKOZCJ8VPn1fKkO3gC.jpg">
      <div class="topbar-title">G & H Division Chat</div>
    </div>

    <!-- Dark / Light toggle -->
    <div class="toggle-btn" onclick="toggleTheme()">🌙</div>
  </div>

  <!-- ===== CHAT AREA ===== -->
  <div class="chat-area" id="chatArea"></div>

  <!-- ===== INPUT BOX ===== -->
  <div class="input-box">
    <button class="btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="file" id="fileInput" accept="image/*">

    <input type="text" id="msgText" class="text-input" placeholder="Type a message...">

    <button class="btn" onclick="sendMsg()">➤</button>
  </div>


<script>
  let chatArea = document.getElementById("chatArea");

  /* =============================
        LOAD CHAT HISTORY
  ============================= */
  function loadChat(){
    let messages = JSON.parse(localStorage.getItem("chatData")) || [];
    messages.forEach(m => showMessage(m.text, m.type, m.image));
  }
  loadChat();

  function saveMsg(text, type, image){
    let messages = JSON.parse(localStorage.getItem("chatData")) || [];
    messages.push({text, type, image});
    localStorage.setItem("chatData", JSON.stringify(messages));
  }

  function showMessage(text, type, image){
    let div = document.createElement("div");
    div.className = "msg " + type;

    if(image){
      div.innerHTML = `<img src="${image}">`;
    } 
    else {
      div.textContent = text;
    }

    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function sendMsg(){
    let text = document.getElementById("msgText").value.trim();
    if(text === "") return;

    showMessage(text, "me", null);
    saveMsg(text, "me", null);

    document.getElementById("msgText").value = "";
  }

  // IMAGE SENDING
  document.getElementById("fileInput").onchange = function(){
    let file = this.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = () => {
      showMessage("", "me", reader.result);
      saveMsg("", "me", reader.result);
    };
    reader.readAsDataURL(file);
  };


  /* =============================
       🌙 THEME TOGGLE SYSTEM
  ============================= */
  function toggleTheme(){
    document.body.classList.toggle("dark");

    // save theme
    if(document.body.classList.contains("dark")){
      localStorage.setItem("theme", "dark");
      document.querySelector(".toggle-btn").textContent = "☀️";
    } else {
      localStorage.setItem("theme", "light");
      document.querySelector(".toggle-btn").textContent = "🌙";
    }
  }

  // Load saved theme
  let savedTheme = localStorage.getItem("theme");
  if(savedTheme === "dark"){
    document.body.classList.add("dark");
    document.querySelector(".toggle-btn").textContent = "☀️";
  }

</script>

</body>
</html>
